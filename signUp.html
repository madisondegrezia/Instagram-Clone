<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="SignUpContainer">
      <form class="SignUpform">
        <p class="title">Register</p>
        <p class="message">Signup now and get full access to our app.</p>
        <div class="SignUpFlex">
          <label>
            <input required="" placeholder="" type="text" class="SignUpInput" />
            <span class="SignUpSpan">Firstname</span>
          </label>

          <label>
            <input required="" placeholder="" type="text" class="SignUpInput" />
            <span class="SignUpSpan">Lastname</span>
          </label>
        </div>

        <label>
          <input required="" placeholder="" type="email" class="SignUpInput" />
          <span class="SignUpSpan">Email</span>
        </label>

        <label>
          <input
            required=""
            placeholder=""
            type="password"
            class="SignUpInput"
          />
          <span class="SignUpSpan">Password</span>
        </label>
        <label>
          <input
            required=""
            placeholder=""
            type="password"
            class="SignUpInput"
          />
          <span class="SignUpSpan">Confirm password</span>
        </label>
        <button class="submit">
          <a style="color: white; text-decoration: none" href="account.html"
            >Submit</a
          >
        </button>
        <p class="signin">
          Already have an account? <a href="index.html">Signin</a>
        </p>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
